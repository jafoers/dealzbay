<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dealzbay — eBay-Deals finden, bevor es jemand anders tut</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: 'Lucida Console', 'Consolas', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .container {
    max-width: 600px;
    width: 100%;
  }

  .prompt-line {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 4rem;
  }

  .prompt-symbol {
    color: #555;
    font-size: 1.1rem;
    user-select: none;
  }

  .logo {
    font-size: 1.8rem;
    font-weight: bold;
    color: #ffffff;
    letter-spacing: 0.05em;
    text-decoration: none;
  }

  h1 {
    font-size: 1rem;
    color: #bbb;
    font-weight: normal;
    margin-bottom: 3rem;
    letter-spacing: 0.06em;
  }

  .cursor {
    display: inline-block;
    width: 11px;
    height: 1.1em;
    background: #e8e8e8;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .tagline {
    font-size: 1.35rem;
    color: #e8e8e8;
    line-height: 1.65;
    margin-bottom: 3.5rem;
  }

  .list {
    list-style: none;
    margin-bottom: 3.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .list li {
    font-size: 1rem;
    color: #777;
    padding-left: 1.6rem;
    position: relative;
    line-height: 1.5;
  }

  .list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: #444;
  }

  .list li span {
    color: #ccc;
  }

  .cta-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }

  .btn {
    font-family: 'Lucida Console', 'Consolas', 'Courier New', monospace;
    font-size: 0.95rem;
    padding: 0.75rem 1.6rem;
    border: 1px solid #333;
    background: transparent;
    color: #e8e8e8;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn:hover {
    background: #1a1a1a;
    border-color: #666;
  }

  .btn-primary {
    border-color: #e8e8e8;
  }

  .btn-primary:hover {
    background: #e8e8e8;
    color: #0a0a0a;
  }

  .footer {
    font-size: 0.82rem;
    color: #333;
    display: flex;
    justify-content: space-between;
    border-top: 1px solid #1a1a1a;
    padding-top: 1.25rem;
  }

  .footer a {
    color: #333;
    text-decoration: none;
  }

  .footer a:hover {
    color: #777;
  }
</style>
</head>
<body>
<div class="container">

  <div class="prompt-line">
    <span class="prompt-symbol">~/</span>
    <a href="/" class="logo">dealzbay</a>
    <span class="cursor"></span>
  </div>

  <h1>Startseite</h1>

  <p class="tagline">
    eBay-Deals finden,<br>bevor es jemand anders tut.
  </p>

  <ul class="list">
    <li><span>Echtzeit-Preisscans</span> via eBay API</li>
    <li><span>GPUs, CPUs, RAM</span></li>
    <li><span>konfigurierbare Telegram-Alerts</span></li>
    <li><span>Statistisch bewertet, gefilterte Angebote</span> — nur Signal, kein Spam</li>
  </ul>

  <div class="cta-row">
    <a href="" class="btn btn-primary">Zugang anfragen</a>
    <a href="" class="btn">Kontakt</a>
  </div>

  <div class="footer">
    <span>dealzbay.de</span>
    <div style="display:flex;gap:1.75rem;">
      <a href="/impressum.html">Impressum</a>
      <a href="/datenschutz.html">Datenschutz</a>
    </div>
  </div>

</div>
</body>
</html>
